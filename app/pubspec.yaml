name: kudal_diet
description: 먹을까말까 - 쿠달이와 함께하는 AI 식단 기록 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  dio: ^5.4.0
  image_picker: ^1.1.2
  kakao_flutter_sdk_user: ^1.9.1
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/character/kudal_happy.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/character/
